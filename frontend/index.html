<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>PhytoNexus | Botanical AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Prevent browser zoom to lock layout size (Desktop ONLY)
      if (!('ontouchstart' in window) && navigator.maxTouchPoints === 0) {
        document.addEventListener('keydown', function(event) {
            if (event.ctrlKey === true && (event.key === '0' || event.key === '+' || event.key === '-' || event.key === '=')) {
                event.preventDefault();
            }
        });
        document.addEventListener('wheel', function(event) {
            if (event.ctrlKey === true) {
                event.preventDefault();
            }
        }, { passive: false });
      }
    </script>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="color:red; font-size:16px; font-weight:bold; z-index:9999; position:absolute; top:0; left:0; background:white; padding:20px; border:2px solid red;">' + (e.error ? e.error.stack : e.message) + '</div>';
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
