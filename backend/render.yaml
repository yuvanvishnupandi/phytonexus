services:
  - type: web
    name: plant-lifecycle-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_VISION_MODEL
        value: gpt-4o-mini
      - key: MONGODB_DB_NAME
        value: plant_lifecycle_predictor
      - key: CORS_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false

